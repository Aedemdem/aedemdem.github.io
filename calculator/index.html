<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kalkulator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a24;
      --card:      #1e2333;
      --border:    #2a3047;
      --accent:    #4f8ef7;
      --accent2:   #7c5ef7;
      --danger:    #f74f6a;
      --text:      #e8eaf0;
      --muted:     #606880;
      --btn-num:   #232840;
      --btn-op:    #1a2545;
      --btn-eq:    linear-gradient(135deg, #4f8ef7 0%, #7c5ef7 100%);
      --btn-clr:   #2a1f3d;
      --shadow:    0 8px 40px #0007;
      --radius:    20px;
      --radius-sm: 14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* === BACKGROUND GRID === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(ellipse, rgba(79,142,247,.12), transparent 70%);
      top: -150px; left: -100px;
      pointer-events: none;
      z-index: 0;
    }

    /* === CALC WRAPPER === */
    .calc-wrap {
      position: relative;
      z-index: 1;
      width: min(380px, 96vw);
    }

    .calc-label {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .calculator {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px 20px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,.03) inset;
      position: relative;
      overflow: visible; /* so equals can escape */
    }

    /* top bar */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.r { background: #f74f6a; }
    .dot.y { background: #f7b94f; }
    .dot.g { background: #4ff77e; }

    /* === DISPLAY === */
    .display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 20px 18px 16px;
      margin-bottom: 18px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 6px;
      overflow: hidden;
    }
    .display .expression {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
      word-break: break-all;
      text-align: right;
    }
    .display .result {
      font-family: 'DM Mono', monospace;
      font-size: 36px;
      font-weight: 500;
      color: var(--text);
      word-break: break-all;
      text-align: right;
      transition: transform .12s ease, color .12s ease;
      line-height: 1.1;
    }
    .display .result.shake {
      animation: shake .25s ease;
      color: var(--accent);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* === GRID === */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* === BUTTON BASE === */
    .btn {
      position: relative;
      height: 68px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .1s ease, box-shadow .1s ease, filter .1s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
    }
    .btn:active { transform: scale(.93); filter: brightness(.85); }

    /* number */
    .btn.num {
      background: var(--btn-num);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.05);
    }
    .btn.num:hover { background: #2d3354; }

    /* operator */
    .btn.op {
      background: var(--btn-op);
      color: var(--accent);
      border: 1px solid rgba(79,142,247,.15);
    }
    .btn.op:hover { background: #1e2d57; }

    /* clear / back */
    .btn.clr {
      background: var(--btn-clr);
      color: var(--danger);
      border: 1px solid rgba(247,79,106,.15);
    }
    .btn.clr:hover { background: #3a1f35; }

    /* zero (spans 2) */
    .btn.zero { grid-column: span 2; }

    /* equals */
    .btn.eq {
      background: linear-gradient(135deg, #4f8ef7, #7c5ef7);
      color: #fff;
      border: none;
      box-shadow: 0 4px 20px rgba(79,142,247,.35);
      font-size: 24px;
    }
    .btn.eq:hover { filter: brightness(1.1); }
    .btn.eq.floating {
      position: fixed !important;
      z-index: 9999;
      pointer-events: auto;
      transition: left .22s cubic-bezier(.34,1.56,.64,1), top .22s cubic-bezier(.34,1.56,.64,1), transform .1s ease, box-shadow .1s ease, filter .1s ease;
      width: 68px !important;
      height: 68px !important;
    }

    /* percent */
    .btn.pct {
      background: var(--btn-op);
      color: var(--accent2);
      border: 1px solid rgba(124,94,247,.15);
    }

    /* === POPUP === */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(6px);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .popup-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .popup-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      width: min(340px, 88vw);
      text-align: center;
      box-shadow: 0 20px 60px #0009;
      transform: scale(.85) translateY(20px);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .popup-overlay.show .popup-box {
      transform: scale(1) translateY(0);
    }
    .popup-icon {
      font-size: 48px;
      margin-bottom: 14px;
      display: block;
      animation: bounce 1s ease infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }
    .popup-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: .02em;
    }
    .popup-title span { color: var(--accent); }
    .popup-body {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: #c0c8e0;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .popup-price {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      display: block;
      margin: 10px 0;
    }
    .popup-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, #4f8ef7, #7c5ef7);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(79,142,247,.4);
    }
    .popup-timer {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .popup-timer span { color: var(--accent2); font-weight: 600; }
  </style>
</head>
<body>

  <!-- POPUP -->
  <div class="popup-overlay" id="popup">
    <div class="popup-box">
      <span class="popup-icon">💳</span>
      <div class="popup-title">Fitur <span>Premium</span> Dibutuhkan</div>
      <div class="popup-body">
        Untuk menikmati layanan silakan lakukan pembayaran
        <span class="popup-price">Rp50.000</span>
      </div>
      <button class="popup-btn" id="popupPayBtn">Bayar Sekarang via DANA →</button>
      <div class="popup-timer">Otomatis diarahkan dalam <span id="timerCount">3</span> detik…</div>
    </div>
  </div>

  <!-- CALCULATOR -->
  <div class="calc-wrap">
    <div class="calc-label">Kalkulator</div>
    <div class="calculator" id="calcBox">
      <div class="top-bar">
        <div class="dot r"></div>
        <div class="dot y"></div>
        <div class="dot g"></div>
      </div>

      <div class="display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="buttons" id="btnGrid">
        <!-- Row 1 -->
        <button class="btn clr"  data-action="clear">AC</button>
        <button class="btn clr"  data-action="back">⌫</button>
        <button class="btn pct"  data-action="percent">%</button>
        <button class="btn op"   data-action="op" data-val="/">÷</button>
        <!-- Row 2 -->
        <button class="btn num"  data-action="num" data-val="7">7</button>
        <button class="btn num"  data-action="num" data-val="8">8</button>
        <button class="btn num"  data-action="num" data-val="9">9</button>
        <button class="btn op"   data-action="op" data-val="*">×</button>
        <!-- Row 3 -->
        <button class="btn num"  data-action="num" data-val="4">4</button>
        <button class="btn num"  data-action="num" data-val="5">5</button>
        <button class="btn num"  data-action="num" data-val="6">6</button>
        <button class="btn op"   data-action="op" data-val="-">−</button>
        <!-- Row 4 -->
        <button class="btn num"  data-action="num" data-val="1">1</button>
        <button class="btn num"  data-action="num" data-val="2">2</button>
        <button class="btn num"  data-action="num" data-val="3">3</button>
        <button class="btn op"   data-action="op" data-val="+">+</button>
        <!-- Row 5 -->
        <button class="btn num zero" data-action="num" data-val="0">0</button>
        <button class="btn num"  data-action="dot">.</button>
        <button class="btn eq"   id="eqBtn"  data-action="equals">=</button>
      </div>
    </div>
  </div>

<script>
(function () {
  /* ══════════════════════════════════════════
     STATE
  ══════════════════════════════════════════ */
  let display     = '0';
  let operator    = null;
  let operand1    = null;
  let freshResult = false;   // true after operator press OR after = result

  /* ══════════════════════════════════════════
     PRANK STATE
     - No isMobile gate: prank works on all devices
     - attempts counted per = press (up to MAX_ATT moves)
     - On (MAX_ATT+1)th press → show popup, then restore
  ══════════════════════════════════════════ */
  let attempts  = 0;
  const MAX_ATT = 5;
  let prankDone = false;

  /* ══════════════════════════════════════════
     DOM REFS
  ══════════════════════════════════════════ */
  const resultEl     = document.getElementById('result');
  const expressionEl = document.getElementById('expression');
  const eqBtn        = document.getElementById('eqBtn');
  const popup        = document.getElementById('popup');
  const timerCount   = document.getElementById('timerCount');
  const popupPayBtn  = document.getElementById('popupPayBtn');

  /* ══════════════════════════════════════════
     DISPLAY HELPER
  ══════════════════════════════════════════ */
  function updateDisplay(val) {
    const num = parseFloat(val);
    if (!isNaN(num) && isFinite(num)) {
      const s = String(num);
      resultEl.textContent = s.length > 12
        ? parseFloat(num.toPrecision(8)).toString()
        : s;
    } else {
      resultEl.textContent = val; // 'Error' etc.
    }
  }

  /* ══════════════════════════════════════════
     CORE CALCULATOR LOGIC
  ══════════════════════════════════════════ */
  function calculate(a, b, op) {
    a = parseFloat(a);
    b = parseFloat(b);
    switch (op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? 'Error' : a / b;
    }
  }

  function doEquals() {
    if (operator !== null && operand1 !== null) {
      const b   = parseFloat(display);
      const res = calculate(operand1, b, operator);
      expressionEl.textContent = `${operand1} ${operator} ${b} =`;
      display = String(res);
      updateDisplay(display);
      operator    = null;
      operand1    = null;
      freshResult = true;
    }
  }

  function handleAction(action, val) {
    switch (action) {

      /* ── Numbers ── */
      case 'num':
        if (freshResult) {
          display     = val;
          freshResult = false;
          expressionEl.textContent = '';
        } else {
          display = (display === '0') ? val : display + val;
        }
        updateDisplay(display);
        break;

      /* ── Decimal dot ── */
      case 'dot':
        if (freshResult) { display = '0.'; freshResult = false; }
        else if (!display.includes('.')) display += '.';
        updateDisplay(display);
        break;

      /* ── Operators (+, -, *, /) ──
         BUG FIX #1: must set freshResult = true so the NEXT
         number input starts a brand-new operand, not appended. */
      case 'op':
        if (operator !== null && !freshResult) {
          // Chain operation: compute running total first
          const res = calculate(operand1, parseFloat(display), operator);
          display = String(res);
          updateDisplay(display);
        }
        operand1    = parseFloat(display);
        operator    = val;
        freshResult = true;   // ← THE CRITICAL FIX (was false before)
        expressionEl.textContent = `${operand1} ${val}`;
        break;

      /* ── AC (All Clear) ── */
      case 'clear':
        display     = '0';
        operator    = null;
        operand1    = null;
        freshResult = false;
        updateDisplay(display);
        expressionEl.textContent = '';
        break;

      /* ── ⌫ (Backspace) ── BUG FIX #2: new action */
      case 'back':
        if (freshResult) {
          // After a result, backspace resets to 0
          display     = '0';
          freshResult = false;
        } else {
          display = display.length > 1 ? display.slice(0, -1) : '0';
        }
        updateDisplay(display);
        break;

      /* ── Percent ── */
      case 'percent':
        display = String(parseFloat(display) / 100);
        updateDisplay(display);
        break;
    }
  }

  /* ══════════════════════════════════════════
     GRID CLICK DELEGATION
     BUG FIX #3a: equals button is EXCLUDED here.
     It has its own direct listener (see below) so
     delegation still works after the button moves to <body>.
  ══════════════════════════════════════════ */
  document.getElementById('btnGrid').addEventListener('click', function (e) {
    const btn = e.target.closest('[data-action]');
    if (!btn || btn.dataset.action === 'equals') return; // equals handled separately
    handleAction(btn.dataset.action, btn.dataset.val || '');
  });

  /* ══════════════════════════════════════════
     EQUALS — direct listener on the button element
     BUG FIX #3b: because eqBtn is reparented to <body>
     during the prank, event delegation from #btnGrid breaks.
     A listener attached to the element itself travels with it.
  ══════════════════════════════════════════ */
  eqBtn.addEventListener('click', function () {
    handleEqualsPress();
  });

  /* ══════════════════════════════════════════
     KEYBOARD SUPPORT
  ══════════════════════════════════════════ */
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === '=') { handleEqualsPress(); return; }
    if (e.key === 'Backspace') { handleAction('back', ''); return; }
    if (e.key === 'Escape')    { handleAction('clear', ''); return; }
    if (e.key === '%')         { handleAction('percent', ''); return; }
    if (e.key === '.')         { handleAction('dot', ''); return; }
    if ('0123456789'.includes(e.key)) { handleAction('num', e.key); return; }
    if (['+', '-', '*', '/'].includes(e.key)) { handleAction('op', e.key); return; }
  });

  /* ══════════════════════════════════════════
     PRANK — MOVE EQUALS BUTTON
  ══════════════════════════════════════════ */
  function makeEqFloat() {
    const r = eqBtn.getBoundingClientRect();
    // Freeze current size/position before reparenting
    eqBtn.style.width  = r.width  + 'px';
    eqBtn.style.height = r.height + 'px';
    eqBtn.style.left   = r.left   + 'px';
    eqBtn.style.top    = r.top    + 'px';
    eqBtn.classList.add('floating');

    // Leave an invisible placeholder so the grid layout doesn't collapse
    if (!document.getElementById('eqPlaceholder')) {
      const ph = document.createElement('div');
      ph.id = 'eqPlaceholder';
      ph.style.cssText =
        `width:${r.width}px;height:${r.height}px;visibility:hidden;grid-column:auto;`;
      eqBtn.parentNode.insertBefore(ph, eqBtn);
    }
    // Move button to <body> — the direct listener on eqBtn travels with it
    document.body.appendChild(eqBtn);
  }

  function randomPos() {
    const margin = 24;
    const w = eqBtn.offsetWidth  || 68;
    const h = eqBtn.offsetHeight || 68;
    const maxX = window.innerWidth  - w - margin;
    const maxY = window.innerHeight - h - margin;
    return {
      x: Math.max(margin, Math.floor(Math.random() * maxX)),
      y: Math.max(margin, Math.floor(Math.random() * maxY))
    };
  }

  function moveEqualsAway() {
    if (!eqBtn.classList.contains('floating')) makeEqFloat();
    const pos = randomPos();
    eqBtn.style.left = pos.x + 'px';
    eqBtn.style.top  = pos.y + 'px';
    // Visual feedback: shake the display
    resultEl.classList.remove('shake');
    void resultEl.offsetWidth; // force reflow to restart animation
    resultEl.classList.add('shake');
    setTimeout(() => resultEl.classList.remove('shake'), 350);
  }

  function restoreEquals() {
    const ph = document.getElementById('eqPlaceholder');
    if (ph) {
      ph.parentNode.insertBefore(eqBtn, ph);
      ph.remove();
    }
    eqBtn.classList.remove('floating');
    eqBtn.removeAttribute('style');
  }

  /* ══════════════════════════════════════════
     POPUP + DANA REDIRECT
  ══════════════════════════════════════════ */
  function openDANA() {
    // Format Intent resmi DANA dengan Fallback ke Play Store jika aplikasi tidak ada
    var danaIntent = "intent://m.dana.id/#Intent;scheme=https;package=id.dana;S.browser_fallback_url=https%3A%2F%google.com%2Fstore%2Fapps%2Fdetails%3Fid%3Did.dana;end;";
    
    // Melakukan pengalihan lokasi halaman
    window.location.href = danaIntent;
  }

  function showPopup() {
    popup.classList.add('show');
    let t = 3;
    timerCount.textContent = t;
    const iv = setInterval(() => {
      t--;
      timerCount.textContent = t;
      if (t <= 0) {
        clearInterval(iv);
        openDANA();
        setTimeout(() => {
          popup.classList.remove('show');
          restoreEquals();
          prankDone = true;
        }, 800);
      }
    }, 1000);
  }

  popupPayBtn.addEventListener('click', function () {
    openDANA();
    popup.classList.remove('show');
    restoreEquals();
    prankDone = true;
  });

  /* ══════════════════════════════════════════
     EQUALS PRESS HANDLER
     Flow:
       attempts 1–5  → move button away (no calculation)
       attempt  6    → show popup (redirect after 3 s)
       after popup   → prankDone = true → normal behaviour
  ══════════════════════════════════════════ */
  function handleEqualsPress() {
    if (prankDone) {
      doEquals();
      return;
    }
    attempts++;
    if (attempts <= MAX_ATT) {
      moveEqualsAway();
      // Do NOT calculate — user must catch the button first!
    } else {
      // 6th press: prank complete → show popup
      showPopup();
    }
  }

  /* ══════════════════════════════════════════
     INIT
  ══════════════════════════════════════════ */
  updateDisplay('0');
})();
</script>
</body>
</html>
